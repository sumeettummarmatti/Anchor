<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mentor Workspace</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
      * { box-sizing: border-box; }
      body { min-height: 100vh; margin: 0; color: #edf3ff; background: #08101e; }
      header { min-height: 74px; display: flex; align-items: center; justify-content: space-between; gap: 20px; padding: 13px clamp(16px, 4vw, 42px); border-bottom: 1px solid #2b4167; background: rgba(8, 16, 30, .96); }
      .brand { font-size: 1.05rem; font-weight: 850; letter-spacing: -.025em; }
      .brand span { color: #8bb5ff; }
      nav { display: flex; align-self: stretch; gap: 6px; }
      button { border: 0; border-radius: 8px; padding: 9px 13px; background: transparent; color: #b7c6e0; font: inherit; font-weight: 750; cursor: pointer; }
      button[aria-selected="true"] { background: #293e62; color: #fff; }
      button.logout { border: 1px solid #3a527e; }
      main { min-height: calc(100vh - 74px); }
      .panel { display: none; height: calc(100vh - 74px); }
      .panel.active { display: block; }
      iframe { display: block; width: 100%; height: 100%; border: 0; background: #08101e; }
      @media (max-width: 600px) { header { align-items: flex-start; flex-wrap: wrap; } nav { order: 3; width: 100%; height: 42px; } nav button { flex: 1; } .panel { height: calc(100vh - 129px); } }
    </style>
  </head>
  <body>
    <header>
      <div class="brand">Mentor <span>Workspace</span></div>
      <nav role="tablist" aria-label="Workspace experiences">
        <button type="button" role="tab" id="mentor-tab" aria-controls="mentor-panel" aria-selected="true">Coding Mentor</button>
        <button type="button" role="tab" id="execution-tab" aria-controls="execution-panel" aria-selected="false">Execution Lab</button>
        <button type="button" role="tab" id="interview-tab" aria-controls="interview-panel" aria-selected="false">Interview Engine</button>
      </nav>
      <button type="button" class="logout" id="logout">Log out</button>
    </header>
    <main>
      <section class="panel active" id="mentor-panel" role="tabpanel" aria-labelledby="mentor-tab"><iframe id="mentor-frame" title="Coding Mentor" src="/demo/"></iframe></section>
      <section class="panel" id="execution-panel" role="tabpanel" aria-labelledby="execution-tab"><iframe id="execution-frame" title="Execution Lab" src="/?view=lab&merged=1"></iframe></section>
      <section class="panel" id="interview-panel" role="tabpanel" aria-labelledby="interview-tab"><iframe title="Interview Engine" src="/?view=interview&merged=1"></iframe></section>
    </main>
    <script>
      const accessToken = localStorage.getItem('mentor_access_token');
      if (!accessToken) location.replace('/merged/');
      const tabs = [...document.querySelectorAll('[role="tab"]')];
      const panels = [...document.querySelectorAll('[role="tabpanel"]')];
      let pendingExecutionCode = null;
      const selectTab = (tab) => {
        tabs.forEach((item) => item.setAttribute('aria-selected', String(item === tab)));
        panels.forEach((panel) => panel.classList.toggle('active', panel.id === tab.getAttribute('aria-controls')));
      };
      tabs.forEach((tab) => tab.addEventListener('click', () => selectTab(tab)));
      document.getElementById('logout').addEventListener('click', () => {
        localStorage.removeItem('mentor_access_token');
        localStorage.removeItem('mentor_workspace_session_id');
        location.assign('/merged/');
      });
      const createLearningSession = async () => {
        const headers = { 'Content-Type': 'application/json', Authorization: `Bearer ${accessToken}` };
        const projectResponse = await fetch('/projects', { method: 'POST', headers, body: JSON.stringify({ name: 'Merged workspace scratch', language: 'python' }) });
        const project = await projectResponse.json();
        if (!projectResponse.ok) throw project;
        const sessionResponse = await fetch('/sessions', { method: 'POST', headers, body: JSON.stringify({ project_id: project.id }) });
        const session = await sessionResponse.json();
        if (!sessionResponse.ok) throw session;
        localStorage.setItem('mentor_workspace_session_id', session.id);
        return session.id;
      };
      const hasValidLearningSession = async (sessionId) => {
        if (!sessionId) return false;
        const response = await fetch(`/sessions/${sessionId}`, { headers: { Authorization: `Bearer ${accessToken}` } });
        return response.ok;
      };
      const prepareMentor = async () => {
        let sessionId = localStorage.getItem('mentor_workspace_session_id');
        if (!(await hasValidLearningSession(sessionId))) sessionId = await createLearningSession();
        const frame = document.getElementById('mentor-frame');
        const documentInFrame = frame.contentDocument;
        if (!documentInFrame) return;
        documentInFrame.getElementById('auth-form')?.style.setProperty('display', 'none');
        documentInFrame.getElementById('session-form')?.style.setProperty('display', 'none');
        const sessionInput = documentInFrame.getElementById('session-id');
        if (sessionInput) sessionInput.value = sessionId;
        const sessionOutput = documentInFrame.getElementById('session-output');
        if (sessionOutput) sessionOutput.textContent = 'Learning session ready.';
        createRockyButton(documentInFrame);
        syncRockyButton();
      };
      const createRockyButton = (documentInFrame) => {
        let button = documentInFrame.getElementById('rocky-live-toggle');
        if (button) return button;
        button = documentInFrame.createElement('button');
        button.type = 'button';
        button.id = 'rocky-live-toggle';
        button.textContent = 'Turn on Live Agent Rocky';
        const codeLabel = documentInFrame.querySelector('label[for="code"]');
        codeLabel?.before(button);
        button.addEventListener('click', () => {
          documentInFrame.getElementById('live-tutor-toggle')?.click();
          syncRockyButton();
        });
        return button;
      };
      const syncRockyButton = () => {
        const documentInFrame = document.getElementById('mentor-frame').contentDocument;
        const button = documentInFrame?.getElementById('rocky-live-toggle');
        const liveButton = documentInFrame?.getElementById('live-tutor-toggle');
        if (!button) return;
        const isOn = liveButton?.textContent.includes('ON');
        button.disabled = !liveButton;
        button.textContent = isOn ? 'Turn off Live Agent Rocky' : 'Turn on Live Agent Rocky';
      };
      document.getElementById('mentor-frame').addEventListener('load', () => {
        prepareMentor().catch((error) => console.error('Unable to prepare learning session', error));
      });
      const copyCodeToExecutionLab = () => {
        if (pendingExecutionCode === null) return;
        const executionDocument = document.getElementById('execution-frame').contentDocument;
        const sourceCode = executionDocument?.getElementById('source-code');
        if (!sourceCode) return;
        sourceCode.value = pendingExecutionCode;
        sourceCode.dispatchEvent(new Event('input', { bubbles: true }));
        pendingExecutionCode = null;
      };
      document.getElementById('execution-frame').addEventListener('load', copyCodeToExecutionLab);
      window.addEventListener('message', (event) => {
        if (event.origin !== window.location.origin || event.source !== document.getElementById('mentor-frame').contentWindow) return;
        if (event.data?.type !== 'mentor-visualise' || typeof event.data.code !== 'string') return;
        pendingExecutionCode = event.data.code;
        copyCodeToExecutionLab();
        selectTab(document.getElementById('execution-tab'));
      });
    </script>
  </body>
</html>

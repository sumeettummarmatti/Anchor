databases:
  - name: mentor-db
    plan: free
    databaseName: mentor
    user: mentor

services:
  - type: web
    name: codex-hackathon
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mentor-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: mentor-redis
          type: keyvalue
          property: connectionString
      - key: APP_SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: LLM_PROVIDER
        value: groq
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"
      - key: PISTON_REQUEST_TIMEOUT_SECONDS
        value: "15"

  - type: keyvalue
    name: mentor-redis
    plan: free
    ipAllowList: []
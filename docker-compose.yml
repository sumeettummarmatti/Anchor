services:
  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://mentor:mentor@postgres:5432/mentor
      REDIS_URL: redis://redis:6379/0
      PISTON_BASE_URL: http://piston:2000
      OLLAMA_BASE_URL: http://host.docker.internal:11434/v1
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      piston:
        condition: service_started
      piston-init:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: mentor
      POSTGRES_USER: mentor
      POSTGRES_PASSWORD: mentor
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mentor -d mentor"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  piston:
    image: ghcr.io/engineer-man/piston:latest
    privileged: true
    ports:
      - "2000:2000"
    volumes:
      - piston_data:/piston

  piston-init:
    image: curlimages/curl:8.11.1
    depends_on:
      piston:
        condition: service_started
    command:
      - sh
      - -c
      - |
        set -eu
        until curl --fail --silent http://piston:2000/api/v2/packages >/dev/null; do sleep 2; done
        runtimes="$$(curl --fail --silent http://piston:2000/api/v2/runtimes)"
        if ! printf '%s' "$${runtimes}" | grep -q '"language":"python".*"version":"3.10.0"'; then
          curl --fail --show-error --request POST http://piston:2000/api/v2/packages \
            --header 'Content-Type: application/json' \
            --data '{"language":"python","version":"3.10.0"}'
        fi
        runtimes="$$(curl --fail --silent http://piston:2000/api/v2/runtimes)"
        if ! printf '%s' "$${runtimes}" | grep -q '"language":"javascript".*"version":"18.15.0"'; then
          curl --fail --show-error --request POST http://piston:2000/api/v2/packages \
            --header 'Content-Type: application/json' \
            --data '{"language":"node","version":"18.15.0"}'
        fi

volumes:
  postgres_data:
  piston_data:
